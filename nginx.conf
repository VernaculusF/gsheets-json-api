events {
    worker_connections 1024;
}

http {
    # Upstream к FastAPI приложению
    upstream api_backend {
        server api:8000;
    }

    # Rate limiting zone - 10 запросов в секунду с IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Rate limiting для защиты от перебора
    limit_req_status 429;

    # Логирование
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name localhost;

        # Максимальный размер тела запроса
        client_max_body_size 10M;

        # Timeouts
        client_body_timeout 60s;
        client_header_timeout 60s;
        keepalive_timeout 65s;
        send_timeout 60s;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1000;
        gzip_types application/json text/plain text/css application/javascript;
        gzip_disable "msie6";

        # API эндпоинты с rate limiting
        location /api/ {
            # Rate limiting: 10 req/s, burst до 20 запросов
            limit_req zone=api_limit burst=20 nodelay;

            # Проксирование к FastAPI
            proxy_pass http://api_backend;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # Документация Swagger UI (без жесткого rate limiting)
        location /docs {
            proxy_pass http://api_backend/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ReDoc документация
        location /redoc {
            proxy_pass http://api_backend/redoc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # OpenAPI schema
        location /openapi.json {
            proxy_pass http://api_backend/openapi.json;
            proxy_set_header Host $host;
        }

        # Health check эндпоинт (без rate limiting)
        location /health {
            access_log off;  # Не логируем health checks
            proxy_pass http://api_backend/health;
            proxy_set_header Host $host;
        }

        # Корневой путь
        location = / {
            proxy_pass http://api_backend/;
            proxy_set_header Host $host;
        }

        # Статический контент (если добавите frontend)
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Кастомные страницы ошибок
        error_page 429 /429.html;
        location = /429.html {
            internal;
            default_type application/json;
            return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please try again later."}';
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            internal;
            default_type application/json;
            return 503 '{"error":"Service Unavailable","message":"API is temporarily unavailable"}';
        }
    }
}
